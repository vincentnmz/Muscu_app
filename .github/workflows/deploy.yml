name: Deploy GitHub Pages

on:
  push:
    branches: [main, dev]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4

      - name: Prepare publish folder
        run: |
          mkdir publish
          if [ "${{ github.ref_name }}" = "main" ]; then
            cp index.html publish/index.html
          else
            mkdir publish/dev
            cp index.html publish/dev/index.html
          fi

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0
        continue-on-error: true

      - name: Merge into gh-pages
        run: |
          if [ ! -d gh-pages/.git ]; then
            mkdir -p gh-pages
            cd gh-pages
            git init
            git checkout -b gh-pages
            cd ..
          fi
          if [ "${{ github.ref_name }}" = "main" ]; then
            cp index.html gh-pages/index.html
          else
            mkdir -p gh-pages/dev
            cp index.html gh-pages/dev/index.html
          fi

      - name: Commit and push gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy ${{ github.ref_name }}" || echo "Nothing to commit"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin gh-pages
